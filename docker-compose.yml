services:
  dev:
    build:
      context: .
      target: dev
    ports:
      - 5173:5173
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host 0.0.0.0

  prod:
    build:
      context: .
      target: prod
    ports:
      - 80:80
